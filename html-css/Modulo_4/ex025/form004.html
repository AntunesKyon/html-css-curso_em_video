<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de formulario</h1>
    <form action="cadastro.java" method="get" autocomplete="on">
        <fieldset>
            <legend>Dados Pessoais</legend>
            <p>
               <label for="inome">Nome</label>
               <input type="text" name="nome" id="inome" minlength="5" maxlength="30" required>
            </p>
            <p>
                <label for="">E-mail</label>
                <input type="email" name="" id="iemail" autocomplete="email" required>
            </p>
            <p>
                <label for="">Telefone</label>
                <input type="tel" name="" id="itel" autocomplete="tel" pattern="^\(d{2}\)\d{4,5}-\d{4,5}$" required placeholder="(XX) XXXX-XXXX">
            </p>
        </fieldset>
        <p>
            <input type="submit" value="Limpar">
            <input type="reset" value="Enviar">
        </p>
    </form>
</body>
</html>
