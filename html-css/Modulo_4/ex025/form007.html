<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Formulario</title>
</head>
<body>
    <h1>Exemplo de Formulario</h1>

    <form action="cadastro.java" method="post">
        <p>
            <label for="iest">Estado</label>
            <select name="estado" id="iest">
                
                <option value="" selected>--Escolha--</option>
                <optgroup label="Região Sudeste ">
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="MG">Minas Gerais</option>
                    <option value="ES">Espirito Santo</option>
                    <option value="SP">São Paulo</option>
                </optgroup>

                <optgroup label="Região Norte">
                    <option value="PA">Pará</option>

                </optgroup>

                <optgroup label="Região Nordeste">
                    <option value="PB">Paraiba</option>
                    <option value="BA"> Bahia</option>
                </optgroup>

                <optgroup label="Região Centro-oeste">
                    <option value="MT">Mato Grosso</option>
                </optgroup>

            </select>
        </p>

        <p><!--Permite que o usuario digite caso uma das opções não se encaixe e guarda o resultado-->
            <label for="iprof">Profissão: </label>
            <input type="text" name="prof" id="iprof" list="lstprof">
            <datalist id="lstprof">
                <option value="Contador">Contador</option>
                <option value="Desenvolvedor">Desenvolvedor</option>
                <option value="Mêcanico">Mêcanico</option>
                <option value="Padre">Padre</option>
            </datalist>
        </p>

        <p>
            <label for="imsg">Mensagem:</label><br>
            <textarea name="msg" id="imsg" cols="30" rows="10"></textarea>

        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>

</body>
</html>
