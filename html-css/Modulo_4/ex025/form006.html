<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Formulario</title>
</head>
<body>
    <h1>Exemplo de Formulario</h1>
    <form action="cadastro.java" method="post" autocomplete="on"></form>
    <!--Se for enviar arquivo use o post-->
    
    <p>
        <label for="icor">Cor:</label>
        <input type="color" name="cor" id="icor" value="#14a1bd">
    </p>
    <p>
        <label for="inivel">Nível de Satisfação</label>
        <input type="range" name="nivel" id="inivel" min="0" max="10" value="0">
    </p>
    <p>
        <label for="ifoto">Foto de Perfil</label>
        <input type="file" name="foto" id="ifoto">
    </p>
    <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </p>
</body>
</html>
